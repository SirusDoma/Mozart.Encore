name: Draft Release

on:
  workflow_dispatch:
    inputs:
      all_branches:
        description: 'Build all ("main" and "dev/*" branches are excluded)'
        required: false
        default: true
        type: boolean
      tag:
        description: 'Release tag name'
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        if: ${{ inputs.all_branches }}
        with:
          fetch-depth: 0

      - id: set
        name: Detect build mode
        run: |
          if [ "${{ inputs.all_branches }}" == "true" ]; then
            BRANCHES=$(git branch -r --format='%(refname:short)' \
              | sed 's|^origin/||' \
              | grep -v -E '^(HEAD|main|dev/)' \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            BRANCHES='["${{ github.ref_name }}"]'
          fi
          # Each rid runs on its matching host OS so the published binary can be
          # executed later (to resolve the per-branch Version via `<exe> version`).
          INCLUDE='[{"rid":"win-x86","os":"windows-latest"},{"rid":"linux-x64","os":"ubuntu-latest"}]'
          echo "matrix={\"branch\":$BRANCHES,\"rid\":[\"win-x86\",\"linux-x64\"],\"include\":$INCLUDE}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Detect project
        id: project
        shell: bash
        run: |
          PROJECT=$(grep -rl '<OutputType>Exe</OutputType>' Source/*/*.csproj | head -1)
          if [ -z "$PROJECT" ]; then
            echo "::error::No executable project found"
            exit 1
          fi
          ASSEMBLY=$(sed -n 's|.*<AssemblyName>\([^<]*\)</AssemblyName>.*|\1|p' "$PROJECT" | head -1)
          echo "path=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "assembly=$ASSEMBLY" >> "$GITHUB_OUTPUT"

      - name: Resolve platform
        id: platform
        shell: bash
        run: |
          case "${{ matrix.rid }}" in
            win-x86)   echo "value=x86" >> "$GITHUB_OUTPUT" ;;
            linux-x64) echo "value=x64" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Publish
        shell: bash
        run: |
          dotnet publish "${{ steps.project.outputs.path }}" \
            -c Release \
            -r ${{ matrix.rid }} \
            -p:Platform=${{ steps.platform.outputs.value }} \
            --self-contained \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=none \
            -o publish

      - name: Resolve version
        id: version
        shell: bash
        run: |
          ASSEMBLY="${{ steps.project.outputs.assembly }}"
          RID="${{ matrix.rid }}"
          if [[ "$RID" == win-* ]]; then
            EXE="publish/${ASSEMBLY}.exe"
          else
            EXE="publish/${ASSEMBLY}"
            chmod +x "$EXE"
          fi

          # Invoke VersionCommandTask (registered as subcommand "version") to
          # obtain the per-branch Program.Version — not the release input tag.
          OUTPUT=$("$EXE" version)
          echo "$OUTPUT"

          VERSION=$(echo "$OUTPUT" | awk '$1 == "[v]" && $2 == "Version:" {print $3; exit}')
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to parse Version from '$EXE version' output"
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify and package
        shell: bash
        run: |
          PROJECT="${{ steps.project.outputs.path }}"
          PROJECT_DIR=$(dirname "$PROJECT")
          ASSEMBLY="${{ steps.project.outputs.assembly }}"
          RID="${{ matrix.rid }}"
          VERSION="${{ steps.version.outputs.value }}"

          # Determine executable name
          if [[ "$RID" == win-* ]]; then
            EXE="${ASSEMBLY}.exe"
          else
            EXE="${ASSEMBLY}"
          fi

          # Prepare staging directory
          mkdir -p staging

          # Copy executable from publish output
          if [ ! -f "publish/$EXE" ]; then
            echo "::error::Executable $EXE not found in publish output"
            ls -la publish/
            exit 1
          fi
          cp "publish/$EXE" staging/

          # Copy PreserveNewest content files if they exist
          PRESERVE_FILES=$(grep -B1 'PreserveNewest' "$PROJECT" | sed -n 's/.*Update="\([^"]*\)".*/\1/p' || true)
          for f in $PRESERVE_FILES; do
            if [ -f "$PROJECT_DIR/$f" ]; then
              cp "$PROJECT_DIR/$f" staging/
            fi
          done

          # Copy README.md
          if [ ! -f "README.md" ]; then
            echo "::error::README.md not found in repository root"
            exit 1
          fi
          cp README.md staging/

          echo "Package contents:"
          ls -1 staging

          # Create zip
          cd staging
          7z a -tzip "$GITHUB_WORKSPACE/${ASSEMBLY}-${RID}-${VERSION}.zip" .

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.project.outputs.assembly }}-${{ matrix.rid }}-${{ steps.version.outputs.value }}
          path: ${{ steps.project.outputs.assembly }}-${{ matrix.rid }}-${{ steps.version.outputs.value }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Check tag availability
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ inputs.tag }}"
          if gh api "repos/$GH_REPO/git/refs/tags/$TAG" --silent 2>/dev/null; then
            echo "::warning::Tag '$TAG' already exists. Consider deleting the existing tag or using a different tag name."
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ inputs.tag }}"
          gh release create "$TAG" \
            --draft \
            --title "Draft Release $TAG" \
            --generate-notes \
            artifacts/*.zip
